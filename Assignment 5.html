<!DOCTYPE html>
<html>
  <head>
    <title>Using an Event Listener</title>
    <style>
    
      body{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        height: 100vh;
      }
      
      span{
        font-size: 100px;
        font-weight: bold;
      }
      
      .buttons{
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      
      button{
        height: 50px;
        font-size: 50px;
        font-weight: bold;
        width: 100%;
        border-radius: 9px;
      }
      
      #btn-up{
        background-color:#2d8c1e;
      }
      #btn-down{
        background-color:#a31818;
      }
      
    </style>
  </head>
  <body>
    <span id="number-el">0</span>
    <div class="buttons">
      <button id="btn-up">Increase</button>
      <button id="btn-down">Decrease</button>
    </div>
    <script>
      const buttonUp = document.getElementById('btn-up');
      const buttonDown = document.getElementById('btn-down');
      const number = document.getElementById('number-el');
      let numberCount = 0;
      buttonUp.addEventListener("click", function () {
        numberCount += 1;
        number.innerText = numberCount;
      });
      buttonDown.addEventListener("click", function () {
        numberCount -= 1;
        number.innerText = numberCount;
      });
    </script>
  </body>
</html>
